name: Build and deploy Python app to Azure Web App - remindly-app
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: .
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_11E519BACB6F46ABA56CD4565CF3D1EC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E5ECE12DD5484133A3B33E4D54941080 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6474059CB60F4A6F991D965074A448F3 }}
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'remindly-app'
          slot-name: 'Production'
