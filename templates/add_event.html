{% extends "base.html" %}
{% block title %}Add Event — Remindly{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <p class="page-label">New</p>
    <h1 class="page-title">Add an Event</h1>
  </div>
  <a href="{{ url_for('main.dashboard') }}" class="btn btn-ghost">← Back</a>
</div>

<div class="form-wrapper">
  <form action="{{ url_for('main.add_event') }}" method="POST" class="event-form" novalidate>

    <div class="form-group">
      <label for="title" class="form-label">Event Title <span class="required">*</span></label>
      <input
        type="text"
        id="title"
        name="title"
        class="form-input"
        placeholder="e.g. Team standup, Doctor appointment…"
        value="{{ form_data.get('title', '') }}"
        required
        autofocus
      />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="date" class="form-label">Date <span class="required">*</span></label>
        <input
          type="date"
          id="date"
          name="date"
          class="form-input"
          value="{{ form_data.get('date', '') }}"
          required
        />
      </div>

      <div class="form-group">
        <label for="time" class="form-label">Time <span class="required">*</span></label>
        <input
          type="time"
          id="time"
          name="time"
          class="form-input"
          value="{{ form_data.get('time', '') }}"
          required
        />
      </div>
    </div>

    <div class="form-group">
      <label for="description" class="form-label">Description <span class="optional">(optional)</span></label>
      <textarea
        id="description"
        name="description"
        class="form-input form-textarea"
        placeholder="Any notes or details about this event…"
        rows="4"
      >{{ form_data.get('description', '') }}</textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary btn-lg">Save Event →</button>
      <a href="{{ url_for('main.dashboard') }}" class="btn btn-ghost">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
